name: Build, Scan, and Push Docker Image in Google Cloud

on:
  push:
    branches:
      - main

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  IMAGE_NAME: migration-app
  IMAGE_TAG: latest
  DOCKER_REGISTRY: docker.io
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  SONAR_URL: https://sonarcloud.io
  GCP_PROJECT_ID: ${{ secrets.PROJECT_NAME }}
  GCP_REGION: us-central1
  GCP_REPO: migration-docker-images
  GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

jobs:

  workflow-lint:
    name: Check Workflow Syntax
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run actionlint
        uses: rhysd/actionlint@v1.7.1

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: workflow-lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t "$DOCKER_REGISTRY/$DOCKER_USERNAME/$IMAGE_NAME:$IMAGE_TAG" .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan Docker image with Grype
        run: |
          grype "$DOCKER_REGISTRY/$DOCKER_USERNAME/$IMAGE_NAME:$IMAGE_TAG" --fail-on critical

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: "${{ env.DOCKER_USERNAME }}"
          password: "${{ env.DOCKER_PASSWORD }}"

      - name: Push Docker image
        run: |
          docker push "$DOCKER_REGISTRY/$DOCKER_USERNAME/$IMAGE_NAME:$IMAGE_TAG"

  build-and-deploy_gcp:
    runs-on: ubuntu-latest
    needs: [workflow-lint, build-and-deploy]

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ env.GCP_SA_KEY }}"

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: |
          gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Pull image from Docker Hub
        run: |
          docker pull "$DOCKER_REGISTRY/$DOCKER_USERNAME/$IMAGE_NAME:$IMAGE_TAG"

      - name: Tag image for Artifact Registry
        run: |
          docker tag "$DOCKER_REGISTRY/$DOCKER_USERNAME/$IMAGE_NAME:$IMAGE_TAG" \
          "${GCP_REGION}-docker.pkg.dev/$GCP_PROJECT_ID/$GCP_REPO/$IMAGE_NAME:$IMAGE_TAG"

      - name: Push to Artifact Registry
        run: |
          docker push "${GCP_REGION}-docker.pkg.dev/$GCP_PROJECT_ID/$GCP_REPO/$IMAGE_NAME:$IMAGE_TAG"